name: Crypto Price Prediction - Daily Batch


on:
  schedule:
    # Run daily at 2 AM UTC (adjust time as needed)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

env:
  PYTHON_VERSION: '3.10'

jobs:
  predict:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install ODBC Driver
        run: |
          sudo apt-get update
          sudo apt-get install -y odbc-mssql
          sudo apt-get install -y unixodbc-dev
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set Azure SQL credentials from secrets
        run: |
          cat > .env << EOF
          AZURE_SQL_SERVER=${{ vars.AZURE_SQL_SERVER }}
          AZURE_SQL_DATABASE=${{ vars.AZURE_SQL_DATABASE }}
          AZURE_SQL_CLIENT_ID=${{ vars.AZURE_SQL_CLIENT_ID }}
          AZURE_SQL_CLIENT_SECRET=${{ secrets.AZURE_SQL_CLIENT_SECRET }}
          AZURE_SQL_TENANT_ID=${{ vars.AZURE_SQL_TENANT_ID }}
          EOF
      
      - name: Initialize database tables
        run: |
          python -c "from db_predictions import create_predictions_table; create_predictions_table()"
          python create_coin_predictions_table.py
      
      - name: Ingest latest coin data
        run: |
          python ingest_coins.py
        continue-on-error: true  # Don't fail workflow if ingestion has issues
      
      - name: Generate daily predictions
        run: |
          python daily_batch_predict.py
      
      - name: Merge predictions with actuals
        run: |
          python merge_predictions_actuals.py
        continue-on-error: true  # May not have actuals yet
      
      - name: Generate trading simulation
        run: |
          python simulate_long_short_positions.py
        continue-on-error: true  # Optional reporting task
      
      - name: Filter top 5 coins
        run: |
          python filter_top5_green_coinswitch.py
      
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prediction-outputs
          path: |
            predictions_with_actuals.csv
            top5_coinswitch_5day_predictions.csv
            daily_position_simulation.csv
            positions_actual_vs_predicted.csv
          retention-days: 30
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Prediction workflow failed. Check logs above for details."

  # Optional: Add a separate job to sync data to external storage
  backup:
    runs-on: ubuntu-latest
    needs: predict
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: prediction-outputs
      
      - name: Upload to storage (optional)
        run: |
          # Example: Upload to Azure Blob Storage
          # az storage blob upload --account-name ${{ secrets.STORAGE_ACCOUNT }} \
          #   --container-name predictions --file predictions_with_actuals.csv
          echo "Backup step completed (configure as needed)"
